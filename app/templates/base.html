<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="hardware, temperature">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="keywords"
              content="sistema, hardware, monitoramento, temperatura, cpu, disco">
        <title>Hardware Monitor</title>
        <!-- bootstrap 5.2.3 -->
        <link rel="stylesheet"
              href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
        <!-- font awesome -->
        <link rel="stylesheet"
              href="{{ url_for('static', filename='awesome/all.min.css') }}">
        <!-- prism.js -->
        <link rel="stylesheet"
              href="{{ url_for('static', filename='prism.js/css/prism.css') }}">
        {% block style %}
        {% endblock style %}
    </head>
    <body>
        <nav class="navbar navbar-expand navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{{ url_for('default.index') }}">Hardware Monitor</a>
                <div class="collapse navbar-collapse ">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <!-- botão -->
                            <a class="nav-link" href="#" data-bs-toggle="dropdown" title="Menu">
                                <i class="fa-solid fa-bars fs-5"></i>
                            </a>
                            <!-- parte colapsável -->
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" href="{{ url_for('default.index') }}">Home</a>
                                </li>
                                <li>
                                    <a class="dropdown-item" href="{{ url_for('api.menu') }}">API</a>
                                </li>
                                <li>
                                    <a class="dropdown-item" href="{{ url_for('visualization.index') }}">Dashboard</a>
                                </li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <a class="dropdown-item"
                                       target="_blank"
                                       href="https://getbootstrap.com/docs/5.2/getting-started/introduction/">bootstrap 5.2.3</a>
                                </li>
                                <li>
                                    <a class="dropdown-item"
                                       target="_blank"
                                       href="https://fontawesome.com/icons">font awesome</a>
                                </li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <a class="dropdown-item"  href="{{ url_for('meta.about') }}">Sobre</a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container mt-4">
            {% block content %}
            {% endblock content %}
        </div>
        <!-- bootstrap -->
        <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
        <!-- chart.js -->
        <script src="{{ url_for('static', filename='chart/js/chart.js') }}"></script>
        <!-- prism.js -->
        <script src="{{ url_for('static', filename='prism.js/js/prism.js') }}"></script>
        {# CDN chart/prism #}
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
        {# end of CDN #}
        {% block script %}
        {% endblock script %}
    </body>
</html>
