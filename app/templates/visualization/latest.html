{% extends "base.html" %}
{% block content %}
    <h2 class="mb-3">CPU</h2>
    <div class="card shadow-sm p-3 mb-4">
        <ul id="cpu-list" class="list-group list-group-flush">
            <li class="list-group-item">No data</li>
        </ul>
    </div>
    <h2 class="mb-3">Discos</h2>
    <div class="card shadow-sm p-3 mb-4">
        <ul id="disk-list" class="list-group list-group-flush">
            <li class="list-group-item">No data</li>
        </ul>
    </div>
    <h2 class="mb-3">Batteria</h2>
    <div class="card shadow-sm p-3 mb-4">
        <ul id="battery" class="list-group list-group-flush">
            <li class="list-group-item">No data</li>
        </ul>
    </div>
    <h2 class="mb-3">Rede</h2>
    <div class="card shadow-sm p-3">
        <ul id="network-list" class="list-group list-group-flush">
            <li class="list-group-item">No data</li>
        </ul>
    </div>
{% endblock content %}
{% block script %}
    <script>
        // meta
        function parseMeta(meta) {
            if (!meta) return null;

            if (typeof meta === "string") {
                try {
                    return JSON.parse(meta);
                } catch (e) {
                    console.warn("Invalid meta JSON:", meta);
                    return null;
                }
            }

            return meta;
        }

        // temperatura
        function formatTemp(value, type) {
            const temp_levels = {
                cpu: [
                    { max: 35, cls: "text-success" },
                    { max: 50, cls: "text-info" },
                    { max: 60, cls: "text-primary" },
                    { max: 70, cls: "text-warning" },
                    { max: 80, cls: "text-orange" },
                    { max: 90, cls: "text-danger" },
                    { max: Infinity, cls: "text-dark" }
                ],
                disk: [
                    { max: 35, cls: "text-success" },
                    { max: 55, cls: "text-warning" },
                    { max: Infinity, cls: "text-danger" }
                ]
            };

            if (value == null) return { text: "—", cls: "text-muted" };

            const levels = temp_levels[type];
            if (!levels) return { text: `${value}°C`, cls: "text-secondary" };

            const level = levels.find(l => value <= l.max);

            return {
                text: `${value}°C`,
                cls: level?.cls ?? "text-secondary"
            };
        }

        function formatDisk(value, meta) {
            const temp = formatTemp(value, 'disk');

            let extra = "";

            if (meta) {
                // modelo
                if (meta.model) {
                    extra += ` | ${meta.model}`;
                }
                if (!meta?.model) {
                    extra += " | unknown device ⚠️";
                }

                // health (SMART)
                if (meta.health !== null && meta.health !== undefined) {
                    extra += meta.health ? " | SMART: OK" : " | SMART: FAIL ⚠️";
                }

                // horas ligadas
                if (meta.power_on_hours) {
                    const days = Math.floor(meta.power_on_hours / 24);
                    extra += ` | ${days}d on`;
                }
            }

            return {
                text: `${temp.text}${extra}`,
                cls: temp.cls
            };
        }

        // bateria
        function getBatteryIcon(value) {
            if (value >= 80) return "fa-battery-full";
            if (value >= 60) return "fa-battery-three-quarters";
            if (value >= 40) return "fa-battery-half";
            if (value >= 20) return "fa-battery-quarter";
            return "fa-battery-empty";
        }

        function formatBattery(value, meta) {
            const icon = getBatteryIcon(value);

            let extra = "";
            let cls = "";

            if (meta) {
                // status (Charging, Full, Not charging...)
                if (meta.status) {
                    extra += ` | ${meta.status}`;
                }

                // AC ou bateria
                if (meta.ac_online !== undefined) {
                    extra += meta.ac_online ? " (AC)" : " (Battery)";
                }

                // carregando ⚡
                if (meta.status === "Charging") {
                    extra += " ⚡";
                }

                // health
                if (meta.health !== undefined) {
                    const h = meta.health.toFixed(1);

                    if (meta.health < 50) {
                        extra += ` | health: ${h}% ⚠️`;
                    } else {
                        extra += ` | health: ${h}%`;
                    }
                }
            }

            // cor baseada na %
            if (value == null) {
                cls = "text-muted";
            } else if (value < 20) {
                cls = "text-danger";
            } else if (value < 40) {
                cls = "text-warning";
            }

            return {
                text: value == null ? "—" : `${value}%${extra}`,
                icon,
                cls
            };
        }

        //tailscale
        function getTailscaleIcon(status) {
            if (!status) return "fa-circle-question";
            if (status.includes("self")) return "fa-server"
            if (status.includes("direct")) return "fa-circle-nodes";
            if (status.includes("relay")) return "fa-network-wired";
            if (status.includes("online")) return "fa-signal";
            return "fa-circle-question";
        }

        function localIcon(local){
            return local ? "fa-house-signal" : "fa-wifi";
        }

        //render
        function renderItem({icon, title, value, time, valueCls = "", iconValue = "" }) {
            return `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>
                        <i class="fa-solid ${icon} me-2"></i>
                        ${title}
                    </span>

                    <span class="fw-bold ${valueCls}">
                        ${value}
                        ${iconValue ? `<i class="fa-solid ${iconValue} me-2"></i>` : ""}
                        ${time ? `<small class="text-muted ms-2">${time}</small>` : ""}
                    </span>
                </li>
            `;
        }

        async function loadData() {
            const url = "{{ url_for('api.last_metrics') }}";
            const res = await fetch(url);
            const data = await res.json();

            const cpuList = document.getElementById("cpu-list");
            const diskList = document.getElementById("disk-list");
            const batteryList = document.getElementById("battery");
            const networkList = document.getElementById("network-list");

            cpuList.innerHTML = "";
            diskList.innerHTML = "";
            batteryList.innerHTML = "";
            networkList.innerHTML = "";

            // ---------------- CPU ----------------
            for (const ip in data.cpu || {}) {
                const cores = data.cpu[ip];

                for (const core in cores) {
                    const info = cores[core];
                    const f = formatTemp(info.value, 'cpu');

                    cpuList.innerHTML += renderItem({
                        icon: "fa-microchip",
                        title: `${info.hostname} - ${core} (${ip})`,
                        value: f.text,
                        valueCls: f.cls,
                        time: info.time
                    });
                }
            }

            // ---------------- DISK ----------------
            for (const ip in data.disk || {}) {
                const disks = data.disk[ip];

                for (const disk in disks) {
                    const info = disks[disk];
                    const meta = parseMeta(info.meta);
                    const f = formatDisk(info.value, meta);

                    diskList.innerHTML += renderItem({
                        icon: "fa-hard-drive",
                        title: `${info.hostname} - ${meta?.model || disk} (${ip})`,
                        value: f.text,
                        valueCls: f.cls,
                        time: info.time
                    });
                }
            }

            // ---------------- BATTERY ----------------
            if (!data.battery || Object.keys(data.battery).length === 0) {
                batteryList.innerHTML = '<li class="list-group-item">No data</li>';
            } else {
                for (const ip in data.battery) {
                    const info = data.battery[ip];

                    const meta = parseMeta(info.meta);
                    const f = formatBattery(info.value, meta);

                    batteryList.innerHTML += renderItem({
                        icon: f.icon,
                        title: `${info.hostname} (${ip})`,
                        value: f.text,
                        valueCls: f.cls,
                        time: info.time
                    });
                }
            }

            // ---------------- NETWORK ----------------
            for (const ip in data.network || {}) {
                const interfaces = data.network[ip];

                for (const key in interfaces) {
                    const n = interfaces[key];

                    networkList.innerHTML += renderItem({
                        icon: getTailscaleIcon(n.tailscale),
                        title: `${n.hostname} - ${n.name} (${ip})`,
                        value: n.tailscale,
                        time: n.time,
                        iconValue: localIcon(n.local)
                    });
                }
            }
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
{% endblock script %}
