{% extends "base.html" %}
{% block content %}
    <form method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <label>Início</label>
            <input type="datetime-local"
                   name="start"
                   class="form-control"
                   value="{{ request.args.get('start') }}">
        </div>
        <div class="col-auto">
            <label>Fim</label>
            <input type="datetime-local"
                   name="end"
                   class="form-control"
                   value="{{ request.args.get('end') }}">
        </div>
        <div class="col-auto">
            <label>Tipo</label>
            <select name="device_type" class="form-control"></select>
        </div>
        <div class="col-auto">
            <label>Nome</label>
            <select name="name" class="form-control"></select>
        </div>
        <div class="col-auto">
            <label>Page</label>
            <input type="number"
                   name="page"
                   value="{{ request.args.get('page', 0) }}"
                   class="form-control">
        </div>
        <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-primary">Filtrar</button>
        </div>
    </form>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <button class="btn btn-sm btn-outline-secondary" onclick="prevPage()">← Anterior</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="nextPage()">Próxima →</button>
        </div>
        <div>
            Página: <span id="page-indicator">0</span>
        </div>
        <div>
            <button class="btn btn-sm btn-outline-primary" onclick="reloadAll()">Atualizar</button>
        </div>
    </div>
    <div class="card shadow-sm p-3">
        <button class="btn btn-sm btn-secondary mb-2" onclick="chart.resetZoom()">Reset Zoom</button>
        <canvas id="chart"></canvas>
    </div>
{% endblock content %}
{% block script %}
    <script>
        const form = document.querySelector("form");
        const url = "{{ url_for('api.temperature_series') }}";
        const url_filters = "{{ url_for('api.filters') }}";

        let chart;
        const selected = {{ selected|tojson }};
        let first = true;
        let lastFetchCount = 0;

        function getColor(i) {
            const colors = [
                "#ff6384", "#36a2eb", "#ffcd56",
                "#4bc0c0", "#9966ff", "#ff9f40"
            ];
            return colors[i % colors.length];
        }

        async function loadChart() {
            const params = new URLSearchParams(window.location.search);

            const res = await fetch(url + "?" + params.toString());
            const rawData = await res.json();
            lastFetchCount = rawData.length;

            if (!rawData || rawData.length === 0) {
                if (chart) chart.destroy();
                return;
            }

            // agrupar por device_type + name
            const grouped = {};
            for (const d of rawData) {
                const key = `${d.host_ip}-${d.device_type}-${d.name}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push({
                    x: d.timestamp,
                    y: d.value
                });
            }

            const MAX_GAP = 3 * 60 * 1000; // 3 minutos em ms

            for (const key in grouped) {
                const sorted = grouped[key].sort((a, b) => new Date(a.x) - new Date(b.x));

                const withGaps = [];

                for (let i = 0; i < sorted.length; i++) {
                    if (i > 0) {
                        const prev = new Date(sorted[i - 1].x).getTime();
                        const curr = new Date(sorted[i].x).getTime();

                        if (curr - prev > MAX_GAP) {
                            // 🔥 insere quebra na linha
                            withGaps.push({
                                x: new Date(prev + 1), // ponto logo após o anterior
                                y: null
                            });
                        }
                    }

                    withGaps.push(sorted[i]);
                }

                grouped[key] = withGaps;
            }

            // datasets
            const datasets = [];
            let i = 0;

            for (const key in grouped) {
                datasets.push({
                    label: key,
                    data: grouped[key],
                    borderWidth: 2,
                    tension: 0.3,
                    borderColor: getColor(i),
                    backgroundColor: getColor(i),
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    spanGaps: false
                });
                i++;
            }

            const ctx = document.getElementById("chart").getContext("2d");

            if (chart) chart.destroy();

            // 🔥 limites de temperatura
            const LIMIT_1 = 70; // primeiro nivel de alert
            const LIMIT_2 = 75;
            const LIMIT_3 = 80;
            const LIMIT_4 = 90; // ta pegando fogo bixo

            chart = new Chart(ctx, {
                type: "line",
                data: {
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    animation: false,

                    interaction: {
                        mode: "index",
                        intersect: false
                    },

                    scales: {
                        x: {
                            type: "time",
                            time: {
                                unit: "minute"
                            },
                            ticks: {
                                callback: function(value) {
                                    const date = new Date(value);
                                    return date.toLocaleTimeString("pt-BR", {
                                        hour: "2-digit",
                                        minute: "2-digit",
                                        hour12: false
                                    });
                                }
                            }
                        }
                    },

                    plugins: {

                        // 🔥 TOOLTIP MELHORADO
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const date = new Date(context.parsed.x);

                                    return `${context.dataset.label} • ${
                                        date.toLocaleTimeString("pt-BR", {
                                            hour: "2-digit",
                                            minute: "2-digit",
                                            hour12: false
                                        })
                                    } → ${context.parsed.y}`;
                                }
                            }
                        },

                        // 🔥 ZOOM / PAN CORRETO
                        zoom: {
                            pan: {
                                enabled: true,
                                mode: "x",
                                threshold: 10
                            },
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true },
                                drag: {
                                    enabled: true,
                                    backgroundColor: 'rgba(225,225,225,0.3)',
                                    borderColor: 'rgba(225,225,225,0.8)',
                                    borderWidth: 1,
                                },
                                mode: "x"
                            }
                        },

                        // 🔥 ANNOTATION (LINHA DE LIMITE)
                        annotation: {
                            annotations: {
                                limit1: {
                                    type: "line",
                                    yMin: LIMIT_1,
                                    yMax: LIMIT_1,
                                    borderColor: "#f1c40f", // amarelo
                                    borderWidth: 1,
                                    borderDash: [4, 4],
                                    label: {
                                        display: true,
                                        content: `70°C`,
                                        position: "end",
                                        backgroundColor: "#f1c40f",
                                        color: "#000",
                                        font: { size: 10 }
                                    }
                                },

                                limit2: {
                                    type: "line",
                                    yMin: LIMIT_2,
                                    yMax: LIMIT_2,
                                    borderColor: "#e67e22", // laranja
                                    borderWidth: 1,
                                    borderDash: [4, 4],
                                    label: {
                                        display: true,
                                        content: `75°C`,
                                        position: "end",
                                        backgroundColor: "#e67e22",
                                        color: "#fff",
                                        font: { size: 10 }
                                    }
                                },

                                limit3: {
                                    type: "line",
                                    yMin: LIMIT_3,
                                    yMax: LIMIT_3,
                                    borderColor: "#e74c3c", // vermelho
                                    borderWidth: 2,
                                    borderDash: [6, 6],
                                    label: {
                                        display: true,
                                        content: `80°C`,
                                        position: "end",
                                        backgroundColor: "#e74c3c",
                                        color: "#fff",
                                        font: { size: 10 }
                                    }
                                },

                                limit4: {
                                    type: "line",
                                    yMin: LIMIT_4,
                                    yMax: LIMIT_4,
                                    borderColor: "#8b0000", // vermelho escuro
                                    borderWidth: 2,
                                    borderDash: [6, 6],
                                    label: {
                                        display: true,
                                        content: `90°C 🔥`,
                                        position: "end",
                                        backgroundColor: "#8b0000",
                                        color: "#fff",
                                        font: { size: 10 }
                                    }
                                },

                                dangerZone: {
                                    type: "box",
                                    yMin: LIMIT_3,
                                    yMax: LIMIT_4,
                                    backgroundColor: "rgba(255,0,0,0.08)",
                                    borderWidth: 0
                                }
                            }
                        }
                    }
                }
            });
        }

        async function loadFilters() {
            const params = new URLSearchParams(new FormData(form));
            params.set("info_type", "temperature");
            if (first) {
                if (selected['device_type'])
                    params.set("device_type", selected['device_type']);
                
                if (selected['name'])
                    params.set("name", selected['name']);

                first = false;
            } else {
                selected['device_type'] = params.get('device_type');
                selected['name'] = params.get('name');
            }

            const res = await fetch(url_filters + "?" + params.toString());
            const data = await res.json();

            fillSelect("device_type", data.device_types);
            fillSelect("name", data.names);
        }

        function fillSelect(name, values) {
            const select = document.querySelector(`select[name="${name}"]`);
            if (!select) return;

            //const current = new URLSearchParams(window.location.search).get(name);
            const current = selected[name];  // 🔥 aqui

            select.innerHTML = `<option value="">Todos</option>`;

            for (const v of values) {
                select.innerHTML += `
                    <option value="${v}" ${v === current ? "selected" : ""}>
                        ${v}
                    </option>
                `;
            }
        }

        function getPage() {
            const params = new URLSearchParams(window.location.search);
            return Math.max(0, parseInt(params.get("page") || "0", 10));
        }

        function setPage(page) {
            const params = new URLSearchParams(window.location.search);
            params.set("page", Math.max(0, page));

            history.pushState(null, "", "?" + params.toString());

            updatePageIndicator();
            loadChart();
            loadFilters();
        }

        function nextPage() {
            if (lastFetchCount < 420) return; // não avança
            setPage(getPage() + 1);
        }

        function prevPage() {
            setPage(getPage() - 1);
        }

        function updatePageIndicator() {
            document.getElementById("page-indicator").textContent = getPage();
        }

        function reloadAll() {
            loadChart();
            loadFilters();
        }

        // dependência entre selects (igual metrics)
        document.querySelector("select[name='device_type']")
            .addEventListener("change", () => {
                document.querySelector("select[name='name']").value = "";
                loadFilters();
            });

        // submit sem reload
        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const params = new URLSearchParams(new FormData(form));

            // 🔥 sempre volta pra página 0 quando muda filtro
            params.set("page", 0);

            history.pushState(null, "", "?" + params.toString());

            updatePageIndicator();
            loadChart();
            loadFilters();
        });

        // init
        loadFilters();
        loadChart();

        setInterval(loadChart, 60000);
        updatePageIndicator();
    </script>
{% endblock script %}
