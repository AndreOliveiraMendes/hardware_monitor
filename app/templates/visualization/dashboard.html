{% extends "base.html" %}
{% block content %}
    <form method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <label>Início</label>
            <input type="datetime-local"
                   name="start"
                   class="form-control"
                   value="{{ request.args.get('start') }}">
        </div>
        <div class="col-auto">
            <label>Fim</label>
            <input type="datetime-local"
                   name="end"
                   class="form-control"
                   value="{{ request.args.get('end') }}">
        </div>
        <div class="col-auto">
            <label>Tipo</label>
            <select name="type" class="form-control">
                <option value="">Todos</option>
                {% for type in types %}
                    <option value="{{ type }}"
                            {% if request.args.get('type') == type %}selected{% endif %}>{{ type }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-auto">
            <label>Nome</label>
            <select name="name" class="form-control">
                <option value="">Todos</option>
                {% for name in names %}
                    <option value="{{ name }}"
                            {% if request.args.get('name') == name %}selected{% endif %}>{{ name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-primary">Filtrar</button>
        </div>
    </form>
    <h2 class="mb-3">dados coletados:</h2>
    <div id="info"></div>
    <div class="card shadow-sm p-3 mb-4">
        <ul id="data-list" class="list-group list-group-flush">
        </ul>
    </div>
{% endblock content %}
{% block script %}
    <script>
        const url = "{{ url_for('api.all_metrics') }}"
        function formatInfo(params) {
            const start = params.get("start");
            const end = params.get("end");

            if (start && end) {
                return `Exibindo de <b>${start}</b> até <b>${end}</b>`;
            } else if (start) {
                return `Exibindo a partir de <b>${start}</b>`;
            } else if (end) {
                return `Exibindo até <b>${end}</b>`;
            }
            return "";
        }

        async function loadData() {
            const params = new URLSearchParams(window.location.search);

            const res = await fetch(url + "?" + params.toString());
            const data = await res.json();

            const list = document.getElementById("data-list");
            const info = document.getElementById("info");

            list.innerHTML = "";

            const infoText = formatInfo(params);
            if (infoText) {
                info.innerHTML = `<div class="alert alert-info">${infoText}</div>`;
            }

            if (data.length === 0) {
                list.innerHTML = '<li class="list-group-item">No data</li>';
                return;
            }

            for (const item of data) {
                const [timestamp, infotype, tipo, nome, temp] = item;

		if (infotype === "temperature") {
                    list.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between">
			    <span>${timestamp} - ${infotype} - ${tipo} - ${nome}</span>
                            <span class="fw-bold">${temp}°C</span>
                        </li>
                    `;
		} else if(infotype === "battery") {
		    list.innetHTML += `
			<li class="list-group-item d-flex justify-content-between">
			    <span>${timestamp} - ${infotype}</span>
			    <span class="fw-bold">${temp}%</span>
			</li>
		    `;
		} else {
		    list.innetHTML += `
			<li class="list-group-item d-flex justify-content-between">
			    <span>${timestamp} ${infotype}</span>
			    <span class="fw-bold"> desconhecido</span>
			</li>
		    `;
		} 
            }
        }

        document.querySelector("form").addEventListener("submit", (e) => {
            e.preventDefault();

            const params = new URLSearchParams(new FormData(e.target));
            const newUrl = window.location.pathname + "?" + params.toString();

            history.pushState(null, "", newUrl);
            loadData();
        });

        loadData();
    </script>
{% endblock script %}
