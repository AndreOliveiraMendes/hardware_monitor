{% extends "base.html" %}
{% block content %}
    <form method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <label>Início</label>
            <input type="datetime-local"
                   name="start"
                   class="form-control"
                   value="{{ request.args.get('start') }}">
        </div>
        <div class="col-auto">
            <label>Fim</label>
            <input type="datetime-local"
                   name="end"
                   class="form-control"
                   value="{{ request.args.get('end') }}">
        </div>
        <div class="col-auto">
            <label>Informação</label>
            <select name="info_type" class="form-control"></select>
        </div>
        <div class="col-auto">
            <label>Host ip</label>
            <select name="host_ip" class="form-control"></select>
        </div>
        <div class="col-auto">
            <label>Tipo</label>
            <select name="device_type" class="form-control"></select>
        </div>
        <div class="col-auto">
            <label>Nome</label>
            <select name="name" class="form-control"></select>
        </div>
        <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-primary">Filtrar</button>
        </div>
    </form>
    <h2 class="mb-3">Dados coletados:</h2>
    <div id="info"></div>
    <div class="card shadow-sm p-3 mb-3">
        <ul id="data-list" class="list-group list-group-flush">
        </ul>
    </div>
    <div id="pagination" class="d-flex justify-content-center"></div>
{% endblock content %}
{% block script %}
    <script>
        const form = document.querySelector("form");
        const url = "{{ url_for('api.all_metrics') }}";
        const url_filters = "{{ url_for('api.filters') }}";
        const selected = {{ selected|tojson }};
        let first = true;

        function formatInfo(params) {
            const start = params.get("start");
            const end = params.get("end");

            if (start && end) return `De <b>${start}</b> até <b>${end}</b>`;
            if (start) return `A partir de <b>${start}</b>`;
            if (end) return `Até <b>${end}</b>`;
            return "";
        }

        function getInfoIcon(type) {
            if (type === "temperature") return "fa-temperature-high";
            if (type === "battery") return "fa-battery-half";
            if (type === "network") return "fa-network-wired";
            return "fa-circle-info";
        }

        function getInfoColor(type) {
            if (type === "temperature") return "text-danger";
            if (type === "battery") return "text-success";
            if (type === "network") return "text-primary";
            return "text-secondary";
        }

        function formatMetaTooltip(type, meta) {
            if (!meta) return "";

            if (type === "battery") {
                return `Status: ${meta.status ?? "?"}\nAC: ${meta.ac_online ? "plugado" : "bateria"}\nCap: ${meta.capacity ?? "?"}%`;
            }

            if (type === "network") {
                return `Local: ${meta.local ?? "?"}\nTailscale: ${meta.tailscale ?? "?"}`;
            }

            return JSON.stringify(meta, null, 1);
        }

        async function loadData() {
            const params = new URLSearchParams(window.location.search);

            if (!params.has("page")) params.set("page", "0");

            const res = await fetch(url + "?" + params.toString());
            const result = await res.json();

            const data = result.data;
            const page = result.page;
            const hasNext = result.has_next;
            const hasPrev = result.has_prev;

            const list = document.getElementById("data-list");
            const info = document.getElementById("info");

            list.innerHTML = "";

            const infoText = formatInfo(params);
            info.innerHTML = infoText
                ? `<div class="alert alert-info">${infoText}<br><small>Total: ${result.total}</small></div>`
                : "";

            if (!data || data.length === 0) {
                list.innerHTML = '<li class="list-group-item">No data</li>';
                return;
            }

            let index = page * result.per_page + 1;

            for (const item of data) {
                const { timestamp, hostname, host_ip, infotype, device_type, name, value } = item;

                let unit = infotype === "temperature" ? "°C"
                        : infotype === "battery" ? "%"
                        : "";

                let label = `[${index}] ${timestamp} - ${hostname} (${host_ip})`;
                if (device_type) label += ` - ${device_type}`;
                if (name) label += ` - ${name}`;

                let meta = {};
                try {
                    meta = item.meta ? JSON.parse(item.meta) : {};
                } catch {}

                const tooltip = formatMetaTooltip(infotype, meta).replace(/"/g, '&quot;');

                list.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between">
                        <span title="${tooltip}">
                            <i class="fa-solid ${getInfoIcon(infotype)} ${getInfoColor(infotype)} me-2"></i>
                             ${label}
                        </span>
                        <span class="fw-bold">${value ?? "?"}${unit}</span>
                    </li>
                `;

                index++;
            }

            renderPagination(page, hasPrev, hasNext);
        }

        function renderPagination(page, hasPrev, hasNext) {
            const container = document.getElementById("pagination");

            container.innerHTML = `
                <ul class="pagination">
                    <li class="page-item ${!hasPrev ? "disabled" : ""}">
                        <button class="page-link" onclick="changePage(${page - 1})">←</button>
                    </li>

                    <li class="page-item active">
                        <span class="page-link">${page + 1}</span>
                    </li>

                    <li class="page-item ${!hasNext ? "disabled" : ""}">
                        <button class="page-link" onclick="changePage(${page + 1})">→</button>
                    </li>
                </ul>
            `;
        }

        function changePage(newPage) {
            const params = new URLSearchParams(window.location.search);
            params.set("page", newPage);

            history.pushState(null, "", "?" + params.toString());
            loadData();
        }

        async function loadFilters() {
            const params = new URLSearchParams(new FormData(form));

            if (first) {
                if (selected['host_ip'])
                    params.set("host_ip", selected['host_ip']);

                if (selected['device_type'])
                    params.set("device_type", selected['device_type']);
                
                if (selected['name'])
                    params.set("name", selected['name']);

                if (selected['info_type'])
                    params.set("info_type", selected['info_type ']);

                first = false;
            } else {
                selected['host_ip'] = params.get('host_ip');
                selected['device_type'] = params.get('device_type');
                selected['name'] = params.get('name');
                selected['info_type'] = params.get('info_type');
            }
            const res = await fetch(url_filters + "?" + params.toString());
            const data = await res.json();
            console.log()

            fillSelect("host_ip", data.host_ips);
            fillSelect("info_type", data.info_types);
            fillSelect("device_type", data.device_types);
            fillSelect("name", data.names);
        }

        function fillSelect(name, values) {
            const select = document.querySelector(`select[name="${name}"]`);
            if (!select) return;

            const current = selected[name];  // 🔥 aqui

            select.innerHTML = `<option value="">Todos</option>`;

            for (const v of values) {
                select.innerHTML += `
                    <option value="${v}" ${v === current ? "selected" : ""}>
                        ${v}
                    </option>
                `;
            }
        }

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const params = new URLSearchParams(new FormData(form));
            params.set("page", "0");

            history.pushState(null, "", "?" + params.toString());

            loadData();
            loadFilters();
        });

        document.querySelector("select[name='info_type']")
            .addEventListener("change", () => {
                document.querySelector("select[name='host_ip']").value = "";
                document.querySelector("select[name='device_type']").value = "";
                document.querySelector("select[name='name']").value = "";
                loadFilters();
            });

        document.querySelector("select[name='host_ip']")
                    .addEventListener("change", () => {
                        document.querySelector("select[name='device_type']").value = "";
                        document.querySelector("select[name='name']").value = "";
                        loadFilters();
                    });

        document.querySelector("select[name='device_type']")
            .addEventListener("change", () => {
                document.querySelector("select[name='name']").value = "";
                loadFilters();
            });

        loadFilters();
        loadData();
    </script>
{% endblock script %}
